<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d285" />
      <stop offset="100%" stop-color="#008f5a" />
    </linearGradient>
  </defs>
  <!-- Rounded backdrop matching .logo-icon border-radius -->
  <rect width="512" height="512" rx="128" fill="url(#logo-grad)" />
  
  <!-- Trophy Vector in deep pitch-green stroke matching Lucide Trophy exactly -->
